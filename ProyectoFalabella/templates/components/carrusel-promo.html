<!-- Carrusel de Banners Promocionales -->
<div class="carousel-container">
    <div id="bannerCarousel" class="carousel slide carousel-dark" data-bs-ride="carousel" data-bs-interval="4000">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="{{ url_for('static', filename='images/banners/banner-1-tecnologia.png') }}" class="d-block w-100 banner-img" alt="Banner Tecnología">
            </div>
            <div class="carousel-item">
                <img src="{{ url_for('static', filename='images/banners/banner-2-moda.png') }}" class="d-block w-100 banner-img" alt="Banner Moda">
            </div>
            <div class="carousel-item">
                <img src="{{ url_for('static', filename='images/banners/banner-3-electrodomesticos.png') }}" class="d-block w-100 banner-img" alt="Banner Electrodomésticos">
            </div>
            <div class="carousel-item">
                <img src="{{ url_for('static', filename='images/banners/banner-4-deportes.png') }}" class="d-block w-100 banner-img" alt="Banner Deportes">
            </div>
        </div>

        <!-- Controles de navegación -->
        <button class="carousel-control-prev" type="button" data-bs-target="#bannerCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#bannerCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
        </button>

        <!-- Indicadores -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="0" class="active" aria-current="true"></button>
            <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="2"></button>
            <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="3"></button>
        </div>
    </div>
</div>
